<nav class="navbar navbar-expand-lg custom-navbar" *ngIf="isLoggedIn">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" style="cursor:pointer;" (click)="goHome()">
      <i class="fas fa-cut me-2"></i>
      Glambook
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-4 me-auto">
        <li class="nav-item" *ngFor="let link of navigationLinks">
          <a
            class="nav-link"
            [routerLink]="link.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}">
            {{ link.label }}
          </a>
        </li>
      </ul>

      <div class="navbar-nav">
        <div class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle d-flex align-items-center"
            href="#"
            id="navbarDropdown"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            <i class="fas fa-user-circle me-2"></i>
            {{ roleDisplayName }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <span class="dropdown-item-text text-muted small">
                Logged in as {{ roleDisplayName }}
              </span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button
                class="dropdown-item d-flex align-items-center"
                (click)="logout()">
                <i class="fas fa-sign-out-alt me-2"></i>
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
