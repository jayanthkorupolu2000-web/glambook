<div class="container-fluid py-4">
  <h4 class="fw-bold mb-4" style="color:#244AFD;">📅 My Appointments</h4>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" style="color:#244AFD;"></div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && appointments.length === 0" class="text-center text-muted py-5">
    <div class="fs-1 mb-2">📅</div>
    <p>No appointments yet.</p>
  </div>

  <div *ngIf="!loading && appointments.length > 0" class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Customer</th>
          <th>Service</th>
          <th>Date &amp; Time</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let appt of appointments">
          <td class="text-muted small">{{ appt.id }}</td>
          <td class="fw-semibold">{{ appt.customerName }}</td>
          <td>{{ appt.serviceName }}</td>
          <td>{{ appt.scheduledAt | date:'dd MMM yyyy, hh:mm a' }}</td>
          <td><span [class]="statusBadgeClass(appt.status)">{{ appt.status }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
