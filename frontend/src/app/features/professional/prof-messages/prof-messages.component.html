<div class="container-fluid py-4">
  <h4 class="fw-bold mb-4" style="color:#244AFD;">Client Messages</h4>

  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

  <div class="row g-0" style="height:70vh;">
    <!-- Left: Customer list -->
    <div class="col-md-3 border-end">
      <div class="p-3 border-bottom">
        <input class="form-control form-control-sm" placeholder="Enter Customer ID to start chat">
        <div class="d-flex gap-2 mt-2">
          <input #cidInput type="number" class="form-control form-control-sm" placeholder="Customer ID">
          <input #cnameInput type="text" class="form-control form-control-sm" placeholder="Name">
          <button class="btn btn-sm text-white" style="background:#244AFD;"
                  (click)="selectCustomer(+cidInput.value, cnameInput.value)">Open</button>
        </div>
      </div>
      <div *ngIf="selectedCustomerId" class="p-3 bg-light border-bottom" style="cursor:pointer;">
        <div class="fw-semibold">{{ selectedCustomerName }}</div>
        <div class="text-muted small">ID: {{ selectedCustomerId }}</div>
      </div>
      <div *ngIf="!selectedCustomerId" class="p-3 text-muted small">
        Enter a customer ID above to start a conversation.
      </div>
    </div>

    <!-- Right: Message thread -->
    <div class="col-md-9 d-flex flex-column">
      <div *ngIf="!selectedCustomerId" class="flex-fill d-flex align-items-center justify-content-center text-muted">
        Select a customer to view messages
      </div>

      <div *ngIf="selectedCustomerId" class="flex-fill overflow-auto p-3" style="max-height:55vh;">
        <div *ngFor="let m of messages" class="mb-3">
          <div class="d-flex justify-content-between align-items-start">
            <span [class]="typeColor(m.type)">{{ m.type }}</span>
            <span class="text-muted small">{{ m.createdAt | date:'dd MMM, HH:mm' }}</span>
          </div>
          <div class="bg-light rounded p-2 mt-1">{{ m.message }}</div>
        </div>
        <div *ngIf="messages.length === 0" class="text-center text-muted py-4">No messages yet.</div>
      </div>

      <!-- Send form -->
      <div *ngIf="selectedCustomerId" class="border-top p-3">
        <form [formGroup]="form" (ngSubmit)="send()">
          <div class="d-flex gap-2 mb-2">
            <select class="form-select form-select-sm w-auto" formControlName="type">
              <option value="GENERAL">General</option>
              <option value="REMINDER">Reminder</option>
              <option value="AFTERCARE">Aftercare</option>
              <option value="FOLLOWUP">Follow-up</option>
            </select>
            <input type="number" class="form-control form-control-sm w-auto"
                   formControlName="appointmentId" placeholder="Appointment ID (optional)">
          </div>
          <div class="d-flex gap-2">
            <textarea class="form-control form-control-sm" rows="2"
                      formControlName="message" placeholder="Type your message..."></textarea>
            <button type="submit" class="btn text-white fw-semibold px-3"
                    style="background:#244AFD;" [disabled]="form.invalid || sending">
              <span *ngIf="sending" class="spinner-border spinner-border-sm"></span>
              <span *ngIf="!sending">Send</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
