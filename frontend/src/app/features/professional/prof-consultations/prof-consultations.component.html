<div class="container py-4" style="max-width:720px;">
  <h4 class="fw-bold mb-4" style="color:#244AFD;">💬 Customer Consultations</h4>

  <div *ngIf="success" class="alert alert-success">{{ success }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Filter -->
  <div class="d-flex gap-2 mb-4">
    <button class="btn btn-sm" [class.btn-primary]="filter===''" [class.btn-outline-secondary]="filter!==''"
            (click)="filter=''; load()">All</button>
    <button class="btn btn-sm" [class.btn-warning]="filter==='PENDING'" [class.btn-outline-secondary]="filter!=='PENDING'"
            (click)="filter='PENDING'; load()">Pending</button>
    <button class="btn btn-sm" [class.btn-success]="filter==='RESPONDED'" [class.btn-outline-secondary]="filter!=='RESPONDED'"
            (click)="filter='RESPONDED'; load()">Responded</button>
  </div>

  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border" style="color:#244AFD;"></div></div>

  <div *ngIf="!loading">
    <div *ngFor="let c of consultations" class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <span class="fs-5 me-2">{{ topicIcon(c.topic) }}</span>
            <span class="badge bg-info text-dark me-1">{{ c.topic }}</span>
            <span class="badge bg-light text-dark border">{{ c.type }}</span>
          </div>
          <span [class]="statusBadge(c.status)">{{ c.status }}</span>
        </div>

        <div class="fw-semibold small text-muted mb-1">From: {{ c.customerName }}</div>
        <p class="mb-2">{{ c.question }}</p>
        <small class="text-muted">{{ c.createdAt | date:'dd MMM yyyy' }}</small>

        <!-- Existing reply -->
        <div *ngIf="c.notes" class="p-2 rounded mt-2 mb-2" style="background:#f0f4ff;">
          <small class="fw-semibold" style="color:#244AFD;">Your reply:</small>
          <p class="mb-0 small">{{ c.notes }}</p>
        </div>

        <!-- Reply form (only for PENDING) -->
        <div *ngIf="c.status === 'PENDING'" class="mt-3">
          <textarea class="form-control form-control-sm mb-2" rows="3"
                    [(ngModel)]="replyText[c.id]"
                    placeholder="Write your professional advice (min 10 characters)..."></textarea>
          <button class="btn btn-sm text-white" style="background:#244AFD;"
                  (click)="reply(c)" [disabled]="submitting[c.id]">
            {{ submitting[c.id] ? 'Sending...' : 'Send Reply' }}
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="consultations.length === 0" class="text-center text-muted py-5">
      No consultations {{ filter ? 'with status ' + filter : '' }}.
    </div>
  </div>
</div>
