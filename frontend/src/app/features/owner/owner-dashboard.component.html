<div class="od-shell">

  <!-- Floating hamburger — shown when sidebar is closed -->
  <button class="od-fab-hamburger" *ngIf="!sidebarOpen" (click)="toggleSidebar()" aria-label="Open sidebar">
    <span></span><span></span><span></span>
  </button>

  <!-- ══ SIDEBAR ══ -->
  <aside class="od-sidebar" [class.od-sidebar--open]="sidebarOpen">

    <!-- Sticky topbar: Glambook brand + toggle button -->
    <div class="od-sidebar__topbar">
      <div class="od-sidebar__brand">
        <div class="od-sidebar__brand-icon">✂</div>
        <div class="od-sidebar__brand-text">
          <span class="od-sidebar__brand-name">{{ ownerName }}</span>
          <span class="od-sidebar__brand-sub">🏪 Salon Owner Portal</span>
        </div>
      </div>
      <button class="od-sidebar__toggle" (click)="toggleSidebar()" aria-label="Close sidebar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Scrollable content -->
    <div class="od-sidebar__scroll">

    <!-- Profile -->
    <div class="od-sidebar__profile">
      <div class="od-sidebar__avatar">{{ ownerName.charAt(0) }}</div>
      <div class="od-sidebar__name">{{ ownerName }}</div>
      <div class="od-sidebar__role">Salon Owner</div>
    </div>

    <!-- Nav -->
    <nav class="od-sidebar__nav">
      <button *ngFor="let link of sidebarLinks"
              class="od-nav-btn"
              [class.od-nav-active]="activeSection === link.id"
              (click)="navigate(link.id)">
        <span class="od-nav-btn__icon">{{ link.icon }}</span>
        <span class="od-nav-btn__label">{{ link.label }}</span>
      </button>
    </nav>

    </div>

  </aside>

  <!-- ══ MAIN ══ -->
  <main class="od-main">
    <router-outlet></router-outlet>
  </main>

</div>
