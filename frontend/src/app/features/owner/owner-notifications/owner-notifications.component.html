<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0" style="color:#244AFD;">Notifications</h4>
    <button class="btn btn-outline-primary btn-sm" (click)="markAllRead()">Mark All as Read</button>
  </div>

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border" style="color:#244AFD;"></div>
  </div>

  <div *ngIf="!loading">
    <div *ngFor="let n of notifications"
         class="card border-0 shadow-sm mb-2 p-3"
         [style.border-left]="!n.isRead ? '4px solid #244AFD' : '4px solid transparent'"
         [class.bg-light]="n.isRead"
         (click)="markRead(n.id)"
         [style.cursor]="n.isRead ? 'default' : 'pointer'">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <span class="me-2">{{ typeIcon(n.type) }}</span>
          <span [class.fw-bold]="!n.isRead">{{ n.message }}</span>
          <div class="text-muted small mt-1">{{ n.createdAt | date:'dd MMM yyyy, HH:mm' }}</div>
        </div>
        <span *ngIf="n.isRead" class="text-muted small ms-3" style="white-space:nowrap;">✓ Read</span>
      </div>
    </div>

    <p *ngIf="notifications.length === 0" class="text-center text-muted py-4">
      No notifications yet.
    </p>
  </div>
</div>
