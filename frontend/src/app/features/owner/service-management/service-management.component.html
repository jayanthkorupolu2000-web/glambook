<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0" style="color:#244AFD;">Services</h4>
    <button class="btn text-white fw-semibold" style="background:#244AFD;" (click)="showForm=!showForm">
      {{ showForm ? 'Cancel' : '+ Add Service' }}
    </button>
  </div>

  <div *ngIf="success" class="alert alert-success py-2">{{ success }}</div>
  <div *ngIf="deactivateMsg" class="alert py-2" style="background:#fff3cd;color:#856404;border-color:#ffc107;">⚠ {{ deactivateMsg }}</div>
  <div *ngIf="deleteMsg" class="alert alert-danger py-2">🗑 {{ deleteMsg }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Add Service Form -->
  <div *ngIf="showForm" class="card border-0 shadow-sm p-4 mb-4">
    <h6 class="fw-bold mb-3">New Service</h6>
    <form [formGroup]="form" (ngSubmit)="addService()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Service Name <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="name" placeholder="e.g. Bridal Makeup">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="category">
            <option value="">Select category</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">For <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="gender">
            <option *ngFor="let g of genders" [value]="g">{{ genderLabel(g) }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Price (₹) <span class="text-danger">*</span></label>
          <input type="number" class="form-control" formControlName="price" placeholder="e.g. 500">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Duration</label>
          <select class="form-select" formControlName="durationMins">
            <option *ngFor="let d of durations" [value]="d">{{ d }} min</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn text-white fw-semibold mt-3 px-4"
              style="background:#244AFD;" [disabled]="form.invalid || submitting">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
        Add Service
      </button>
    </form>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" style="color:#244AFD;" role="status"></div>
  </div>

  <div *ngIf="!loading && !error && grouped.length === 0" class="text-muted text-center py-4">
    No services found. Add your first service!
  </div>

  <div *ngFor="let genderGroup of grouped" class="mb-5">
    <div class="d-flex align-items-center mb-3">
      <span [class]="genderBadgeClass(genderGroup.gender)">{{ genderGroup.gender }}</span>
    </div>

    <div *ngFor="let catGroup of genderGroup.categories" class="mb-4">
      <h6 class="text-muted fw-semibold mb-2 text-uppercase" style="font-size:.75rem;letter-spacing:.08em;">
        {{ catGroup.category }}
      </h6>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Service</th>
              <th>Duration</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let svc of catGroup.services"
                [style.opacity]="svc.isActive === false ? '0.5' : '1'">
              <td class="fw-semibold">
                {{ svc.name }}
                <span *ngIf="svc.isActive === false"
                      class="badge ms-2"
                      style="background:#fff3cd;color:#856404;font-size:.65rem;">INACTIVE</span>
              </td>
              <td>{{ svc.durationMins }} min</td>
              <td>₹{{ svc.price }}</td>
              <td>
                <button class="btn btn-sm me-1"
                        [class]="svc.isActive === false ? 'btn-outline-success' : 'btn-outline-warning'"
                        (click)="toggleService(svc.id, svc.name, svc.isActive !== false)">
                  {{ svc.isActive === false ? 'Activate' : 'Deactivate' }}
                </button>
                <button class="btn btn-sm btn-outline-danger"
                        (click)="deleteService(svc.id, svc.name)">🗑</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
