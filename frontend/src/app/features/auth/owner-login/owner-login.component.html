<!-- ═══════════════════════════════════════════════════════════
     GLAMBOOK · Salon Owner Login
     ═══════════════════════════════════════════════════════════ -->
<div class="gb-auth-page min-vh-100 d-flex align-items-center justify-content-center">

  <div class="gb-card gb-card--opaque">

    <div class="gb-card__header">
      <div class="gb-avatar">
        <i class="fa-solid fa-store"></i>
      </div>
      <h1 class="gb-card__title">Login to GlamBook</h1>
      <p class="gb-card__subtitle">Access your salon dashboard and manage bookings</p>
    </div>

    <div class="gb-role-badge">
      <i class="fa-solid fa-store me-1"></i> Salon Owner
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="off">

      <div class="gb-field">
        <label class="gb-label">
          <i class="fa-regular fa-envelope"></i> Email Address
        </label>
        <input
          type="email"
          class="gb-input"
          [class.gb-input--error]="f['email'].invalid && (f['email'].touched || f['email'].dirty)"
          formControlName="email"
          placeholder="owner@salon.com"
        />
        <div class="gb-error" *ngIf="f['email'].invalid && (f['email'].touched || f['email'].dirty)">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
          <span *ngIf="f['email'].errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="gb-field">
        <label class="gb-label">
          <i class="fa-solid fa-lock"></i> Password
        </label>
        <input
          type="password"
          class="gb-input"
          [class.gb-input--error]="f['password'].invalid && (f['password'].touched || f['password'].dirty)"
          formControlName="password"
          placeholder="Enter your password"
        />
        <div class="gb-error" *ngIf="f['password'].invalid && (f['password'].touched || f['password'].dirty)">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span *ngIf="f['password'].errors?.['required']">Password is required.</span>
        </div>
      </div>

      <div *ngIf="errorMessage" class="gb-server-error">
        <i class="fa-solid fa-triangle-exclamation"></i>{{ errorMessage }}
      </div>

      <button type="submit" class="gb-btn w-100" [disabled]="form.invalid || loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!loading" class="fa-solid fa-right-to-bracket me-2"></i>
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>

    </form>

    <div class="gb-back-link mt-3">
      <a routerLink="/auth" class="gb-link gb-link--back">
        <i class="fa-solid fa-arrow-left me-1"></i>All login options
      </a>
    </div>

  </div>
</div>
