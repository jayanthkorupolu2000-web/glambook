<div class="cnotif-page">

  <!-- ── Hero ──────────────────────────────────────────────────────────────── -->
  <div class="cnotif-hero">
    <div class="cnotif-hero__left">
      <div class="cnotif-hero__eyebrow">Customer</div>
      <h4 class="cnotif-hero__title">Notifications</h4>
    </div>
    <button class="btn-mark-all" (click)="markAllRead()">✓ Mark All as Read</button>
  </div>

  <div class="cnotif-content">

    <!-- Loading -->
    <div *ngIf="loading" class="cnotif-loading">
      <div class="cnotif-spinner"></div>
      <span>Loading notifications…</span>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && notifications.length === 0" class="cnotif-empty">
      <div class="cnotif-empty__icon">🔔</div>
      <div class="cnotif-empty__text">No notifications yet.</div>
    </div>

    <!-- List -->
    <div *ngIf="!loading && notifications.length > 0" class="cnotif-list">
      <div *ngFor="let n of notifications"
           class="cnotif-card"
           [class.unread]="!n.isRead"
           [class.read]="n.isRead"
           (click)="markRead(n.id)"
           [style.cursor]="n.isRead ? 'default' : 'pointer'">

        <!-- Icon -->
        <div class="cnotif-icon"
             [style.background]="borderColor(n.type) + '18'"
             [style.color]="borderColor(n.type)">
          {{ icon(n.type) }}
        </div>

        <!-- Body -->
        <div class="cnotif-body">
          <p class="cnotif-message">{{ n.message }}</p>
          <div class="cnotif-time">{{ n.createdAt | date:'dd MMM yyyy, HH:mm' }}</div>
        </div>

        <!-- Mark read button (only when unread) -->
        <button *ngIf="!n.isRead" class="btn-mark-read" (click)="markRead(n.id)">
          ✓ Read
        </button>

      </div>
    </div>

  </div><!-- /.cnotif-content -->
</div>
