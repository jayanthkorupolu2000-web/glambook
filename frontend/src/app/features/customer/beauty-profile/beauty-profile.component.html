<div class="bp-page">

  <!-- ── Hero Header ──────────────────────────────────────────────────────── -->
  <div class="bp-hero">
    <div class="bp-hero__inner">
      <div class="bp-hero__eyebrow">Customer</div>
      <h4 class="bp-hero__title">Beauty Profile</h4>
      <p class="bp-hero__sub">Set your skin type, hair preferences and sensitivities for personalised recommendations.</p>
    </div>
  </div>

  <div class="bp-content">

    <div *ngIf="loading" class="bp-loading">
      <div class="bp-spinner"></div>
      <span>Loading your profile…</span>
    </div>

    <div *ngIf="!loading" class="bp-card">

      <div *ngIf="success" class="bp-alert bp-alert--success">✅ {{ success }}</div>
      <div *ngIf="error"   class="bp-alert bp-alert--danger">⚠️ {{ error }}</div>

      <form [formGroup]="form">

        <!-- Skin Type -->
        <div class="bp-field">
          <label class="bp-label">Skin Type</label>
          <select class="bp-select" formControlName="skinType">
            <option value="">Select skin type</option>
            <option *ngFor="let s of skinTypes" [value]="s">{{ s }}</option>
          </select>
        </div>

        <!-- Hair Type -->
        <div class="bp-field">
          <label class="bp-label">Hair Type</label>
          <select class="bp-select" formControlName="hairType">
            <option value="">Select hair type</option>
            <option *ngFor="let h of hairTypes" [value]="h">{{ h }}</option>
          </select>
        </div>

        <!-- Hair Texture -->
        <div class="bp-field">
          <label class="bp-label">Hair Texture</label>
          <select class="bp-select" formControlName="hairTexture">
            <option value="">Select texture</option>
            <option *ngFor="let t of hairTextures" [value]="t">{{ t }}</option>
          </select>
        </div>

        <!-- Allergies -->
        <div class="bp-field">
          <label class="bp-label">Allergies / Sensitivities</label>
          <!-- View mode -->
          <div *ngIf="!editMode" class="bp-tags">
            <ng-container *ngFor="let a of allergyOptions">
              <span *ngIf="selectedAllergies.has(a)" class="bp-tag bp-tag--allergy-active bp-tag--view">{{ a }}</span>
            </ng-container>
            <span *ngIf="selectedAllergies.size === 0" class="bp-tag-none">None selected</span>
          </div>
          <!-- Edit mode -->
          <div *ngIf="editMode" class="bp-tags">
            <span *ngFor="let a of allergyOptions"
                  class="bp-tag"
                  [class.bp-tag--allergy-active]="selectedAllergies.has(a)"
                  (click)="toggleAllergy(a)">
              <span *ngIf="selectedAllergies.has(a)">✓</span>{{ a }}
            </span>
          </div>
        </div>

        <!-- Preferred Services -->
        <div class="bp-field">
          <label class="bp-label">Preferred Services</label>
          <!-- View mode -->
          <div *ngIf="!editMode" class="bp-tags">
            <ng-container *ngFor="let s of serviceOptions">
              <span *ngIf="selectedServices.has(s)" class="bp-tag bp-tag--service-active bp-tag--view">{{ s }}</span>
            </ng-container>
            <span *ngIf="selectedServices.size === 0" class="bp-tag-none">None selected</span>
          </div>
          <!-- Edit mode -->
          <div *ngIf="editMode" class="bp-tags">
            <span *ngFor="let s of serviceOptions"
                  class="bp-tag"
                  [class.bp-tag--service-active]="selectedServices.has(s)"
                  (click)="toggleService(s)">
              <span *ngIf="selectedServices.has(s)">✓</span>{{ s }}
            </span>
          </div>
        </div>

        <!-- Additional Notes -->
        <div class="bp-field">
          <label class="bp-label">Additional Notes</label>
          <textarea class="bp-textarea" formControlName="notes" rows="3"
                    placeholder="Any other preferences…"></textarea>
        </div>

        <!-- Actions -->
        <div *ngIf="!editMode">
          <button class="btn-bp-primary" style="width:100%;" (click)="enableEdit()">Edit Profile</button>
        </div>
        <div *ngIf="editMode" class="bp-btn-row">
          <button class="btn-bp-primary" (click)="save()" [disabled]="saving">
            {{ saving ? 'Saving…' : 'Save Profile' }}
          </button>
          <button class="btn-bp-secondary" (click)="cancel()">Cancel</button>
        </div>

      </form>
    </div>

  </div><!-- /.bp-content -->
</div>
