<div class="container py-4" style="max-width:720px;">
  <h4 class="fw-bold mb-4" style="color:#244AFD;">📦 My Orders</h4>

  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border" style="color:#244AFD;"></div></div>

  <div *ngIf="!loading">
    <div *ngFor="let o of orders" class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold">Order #{{ o.id }}</span>
          <span [class]="statusBadge(o.deliveryStatus)">{{ o.deliveryStatus }}</span>
        </div>
        <div *ngFor="let item of o.items" class="d-flex justify-content-between small py-1 border-bottom">
          <span>{{ item.productName }} × {{ item.quantity }}</span>
          <span class="fw-semibold">₹{{ item.price }}</span>
        </div>
        <div class="d-flex justify-content-between mt-2">
          <span class="text-muted small">{{ o.createdAt | date:'dd MMM yyyy' }}</span>
          <span class="fw-bold" style="color:#244AFD;">Total: ₹{{ o.totalAmount }}</span>
        </div>
      </div>
    </div>
    <div *ngIf="orders.length === 0" class="text-center text-muted py-5">
      No orders yet. Browse our products!
    </div>
  </div>
</div>
