<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#f5f0ff" rx="12"/>
  <rect x="20" y="20" width="260" height="160" fill="#e8d8ff" rx="8"/>
  <!-- Perfume bottle -->
  <rect x="115" y="70" width="55" height="70" fill="#9b6ff0" rx="10"/>
  <rect x="125" y="58" width="35" height="18" fill="#7a4fd0" rx="4"/>
  <rect x="133" y="48" width="20" height="14" fill="#6040b0" rx="3"/>
