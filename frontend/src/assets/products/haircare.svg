<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#fce8ee" rx="12"/>
  <rect x="20" y="20" width="260" height="160" fill="#f9d0da" rx="8"/>
  <!-- Shampoo bottle -->
  <rect x="110" y="40" width="50" height="90" fill="#e8547a" rx="8"/>
  <rect x="120" y="30" width="30" height="20" fill="#c8566a" rx="4"/>
  <rect x="125" y="20" width="20" height="15" fill="#a03050" rx="3"/>
  <!-- Label -->
  <rect x="115" y="60" width="40" height="50" fill="white" rx="4" opacity="0.8"/>
  <text x="135" y="80" font-family="Arial" font-size="7" fill="#c8566a" text-anchor="middle" font-weight="bold">HAIR</text>
  <text x="135" y="92" font-family="Arial" font-size="6" fill="#888" text-anchor="middle">CARE</text>
  <!-- Drops -->
  <ellipse cx="80" cy="100" rx="8" ry="12" fill="#e8547a" opacity="0.5"/>
  <ellipse cx="220" cy="90" rx="6" ry="9" fill="#e8547a" opacity="0.4"/>
  <!-- Text -->
  <text x="150" y="155" font-family="Arial" font-size="11" fill="#c8566a" text-anchor="middle" font-weight="bold">Hair Care</text>
</svg>
