server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/glambook?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:glambook_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
jwt.secret=${JWT_SECRET:salon_management_jwt_secret_key_must_be_at_least_256_bits_long}
jwt.expiration=86400000
cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}

# SQL init — runs on every startup in this order:
#   1. schema.sql      — CREATE TABLE IF NOT EXISTS (all tables)
#   2. fresh_setup.sql — ADD COLUMN with INFORMATION_SCHEMA guards (idempotent)
#   3. patch.sql       — suspension columns + salon owner data updates (idempotent)
#   4. data.sql        — INSERT IGNORE product seed data
#   5. seed_professionals.sql — INSERT professionals with WHERE NOT EXISTS guards
#
# alter.sql              — kept as reference only, NOT auto-run (not idempotent)
# remove_messages_groupbookings.sql — run ONCE manually on a new system after first startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:fresh_setup.sql,classpath:patch.sql
spring.sql.init.data-locations=classpath:data.sql,classpath:seed_professionals.sql
spring.jpa.defer-datasource-initialization=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
file.upload-dir=uploads
review.photo.dir=C:/Users/JAYANTH/Desktop/Glambook/frontend/src/assets/review-photos
review.photo.url-prefix=assets/review-photos/
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Email (Gmail SMTP) ──────────────────────────────────────────────────────
# Replace with your Gmail address and App Password (not your regular password).
# To generate an App Password: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
glambook.otp.expiry-minutes=10
